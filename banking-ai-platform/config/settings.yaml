# Banking AI Platform — Environment Configuration

default:
  project_id: banking-ai-dev
  region: asia-south1
  bigquery:
    dataset: analytics
    require_partition_filter: true
  embedding:
    model: text-embedding-ada-002
    dimensions: 1536
    batch_size: 100
  llm:
    provider: openai
    model: gpt-4
    max_tokens: 4096
    temperature: 0.0
  vector_store:
    min_similarity: 0.3
    top_k: 3
  agent:
    max_steps: 10
    timeout_seconds: 300
  quality:
    freshness_max_hours: 6
    z_score_threshold: 3.0
    null_rate_max_pct: 1.0

dev:
  project_id: banking-ai-dev
  llm:
    provider: mock
    model: mock
  embedding:
    model: mock
    dimensions: 1536

staging:
  project_id: banking-ai-staging
  llm:
    provider: openai
    model: gpt-4
  bigquery:
    dataset: analytics_staging

production:
  project_id: banking-ai-prod
  region: asia-south1
  llm:
    provider: openai
    model: gpt-4
  bigquery:
    dataset: analytics
  quality:
    freshness_max_hours: 4
    z_score_threshold: 2.5
    null_rate_max_pct: 0.5
